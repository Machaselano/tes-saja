<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at bottom, #ff9a9e, #1e3c72);
    color: white;
    text-align: center;
}

/* TEXT CINEMATIC */
.text {
    position: absolute;
    top: 40%;
    width: 100%;
    font-size: 32px;
    opacity: 0;
    transition: opacity 2s;
}

/* ACTIVE TEXT */
.show {
    opacity: 1;
}

/* PARTICLE */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 0;}
    to { transform: translateY(-10vh); opacity: 1;}
}

/* ENDING */
.end {
    position: absolute;
    top: 35%;
    width: 100%;
    font-size: 36px;
    animation: fadeIn 3s;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<div id="text" class="text"></div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<script>
const nama = prompt("keysa ❤️:");

const textEl = document.getElementById("text");

const cerita = [
    "Hai " + keysa + " ❤️",
    "Aku gak nyangka...",
    "Kalau seseorang bisa bikin aku sebahagia ini 😊",
    "Dari hal kecil...",
    "Sampai momen yang gak akan aku lupa 💕",
    "Kamu selalu ada di pikiran aku 😌",
    "Dan entah kenapa...",
    "Aku selalu pengen cerita ke kamu duluan",
    "Hari-hari aku jadi lebih berarti sejak ada kamu 🌸",
    "Aku nyaman...",
    "Aku tenang...",
    "Aku bahagia...",
    "Dan itu semua karena kamu ❤️",
    "Kalau suatu hari nanti aku diminta milih lagi...",
    "Aku bakal tetap milih kamu picaaaaa 💖",
    "Bukan karena sempurna...",
    "Tapi karena kamu adalah kamu 😌",
    "Dan itu lebih dari cukup buat aku",
    "Aku sayang kamu ❤️",
    "Selamanya ya? janji boleh tidak? 💍"
];

let i = 0;

function showText() {
    if (i >= cerita.length) {
        ending();
        return;
    }

    textEl.classList.remove("show");

    setTimeout(() => {
        textEl.innerHTML = cerita[i];
        textEl.classList.add("show");
        i++;
    }, 500);

    setTimeout(showText, 3500);
}

setTimeout(showText, 1000);

/* PARTICLE */
function sparkle(){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random()*window.innerWidth+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),5000);
}
setInterval(sparkle,200);

/* ENDING */
function ending(){
    document.body.innerHTML = `
        <div class="end">
            <h1>I LOVE YOU ${keysa} ❤️</h1>
            <p>Kamu segalanya buat aku 💖</p>
        </div>
    `;
}
</script>

</body>
</html>
